<!--
  Decaf Audio Player — GitHub Pages
  When new episodes are added, update daily/voice/manifest.json with the new entry.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Daily Intelligencer — Lady Whistledown's AI Society Papers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0908;
      color: #f5e6c8;
      font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1.25rem;
    }

    /* — Ornate dividers — */
    .ornate-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 0.75rem 0;
      color: #8b1a1a;
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      user-select: none;
    }

    .ornate-rule::before,
    .ornate-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8b1a1a 20%, #8b1a1a 80%, transparent);
    }

    .ornate-rule-double {
      position: relative;
      text-align: center;
      margin: 0.5rem 0;
    }

    .ornate-rule-double::before,
    .ornate-rule-double::after {
      content: '';
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, #8b1a1a 15%, #8b1a1a 85%, transparent);
    }

    .ornate-rule-double::before { margin-bottom: 3px; }
    .ornate-rule-double::after { margin-top: 3px; }

    /* — Masthead — */
    .masthead {
      text-align: center;
      padding: 2.5rem 0 0;
    }

    .masthead-est {
      font-family: 'EB Garamond', serif;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 0.25rem;
    }

    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 800;
      color: #f5e6c8;
      letter-spacing: 0.04em;
      line-height: 1.1;
      margin: 0.5rem 0 0.4rem;
    }

    .masthead-subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: #c9a84c;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .masthead-tagline {
      font-family: 'EB Garamond', serif;
      font-size: 0.85rem;
      font-style: italic;
      color: #f5e6c8;
      opacity: 0.55;
      letter-spacing: 0.08em;
      margin-top: 0.4rem;
    }

    /* — Hero image — */
    .hero {
      position: relative;
      width: 100%;
      margin: 1.5rem 0 2rem;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid rgba(139, 26, 26, 0.3);
    }

    .hero img {
      width: 100%;
      display: block;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, #0a0908 100%);
      pointer-events: none;
    }

    /* — Section headings — */
    .section-heading {
      text-align: center;
      margin: 2.5rem 0 1.75rem;
    }

    .section-heading h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #8b1a1a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .section-heading .heading-line {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 0 auto;
    }

    /* — Episodes — */
    .episodes {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding-bottom: 3rem;
    }

    .episode {
      position: relative;
      background: #f5e6c8;
      color: #1a1714;
      border-radius: 3px;
      padding: 1.5rem 1.5rem 1.25rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .episode:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.55);
    }

    .episode::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #8b1a1a, transparent);
    }

    /* Wax seal */
    .episode .seal {
      position: absolute;
      top: 0.85rem;
      right: 1rem;
      width: 32px;
      height: 32px;
      background: radial-gradient(circle at 40% 40%, #c0392b, #8b1a1a 60%, #5a1010);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 0.8rem;
      color: #f5e6c8;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
      user-select: none;
    }

    .episode.featured .seal {
      width: 38px;
      height: 38px;
      font-size: 0.9rem;
    }

    .episode-dateline {
      font-family: 'EB Garamond', serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8b1a1a;
      margin-bottom: 0.75rem;
      padding-right: 2.5rem;
    }

    .episode.featured .episode-dateline::after {
      content: ' — Latest Dispatch';
      font-style: italic;
      letter-spacing: 0.05em;
      text-transform: none;
      color: #c9a84c;
    }

    .episode audio {
      width: 100%;
      height: 44px;
      border-radius: 6px;
      outline: none;
      filter: contrast(0.95) brightness(0.9);
    }

    /* — Footer — */
    .site-footer {
      text-align: center;
      padding: 1.5rem 1rem 3rem;
      border-top: 1px solid rgba(139, 26, 26, 0.25);
    }

    .site-footer p {
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      font-style: italic;
      color: #f5e6c8;
      opacity: 0.5;
      line-height: 1.6;
    }

    .empty {
      text-align: center;
      color: #f5e6c8;
      opacity: 0.4;
      padding: 3rem 1rem;
      font-style: italic;
    }

    /* — Responsive — */
    @media (min-width: 600px) {
      .masthead { padding-top: 3.5rem; }
      .masthead-title { font-size: 3.6rem; }
      .masthead-subtitle { font-size: 1.15rem; }
      .episode { padding: 1.75rem 2rem 1.5rem; }
    }

    @media (max-width: 400px) {
      .masthead-title { font-size: 2.1rem; }
      .ornate-rule { font-size: 0.9rem; letter-spacing: 0.15em; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Masthead -->
    <header class="masthead">
      <div class="ornate-rule-double"></div>
      <p class="masthead-est">Est. MMXXVI</p>
      <div class="ornate-rule">&#10041;</div>
      <h1 class="masthead-title">The Daily Intelligencer</h1>
      <p class="masthead-subtitle">Lady Whistledown's Society Papers &mdash; AI Edition</p>
      <p class="masthead-tagline">All the intelligence that is fit to whisper</p>
      <div class="ornate-rule">&#10041;</div>
      <div class="ornate-rule-double"></div>
    </header>

    <!-- Hero Image -->
    <div class="hero">
      <img src="./daily/whistledown-hero.png"
           alt="A Regency-era handwritten letter on aged parchment"
           loading="eager">
    </div>

    <!-- Episodes -->
    <section>
      <div class="section-heading">
        <h2>Recent Dispatches</h2>
        <div class="heading-line"></div>
      </div>

      <div class="episodes" id="episodes">
        <p class="empty">Loading dispatches&hellip;</p>
      </div>
    </section>

  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="ornate-rule-double"></div>
      <p>Your humble correspondent remains ever watchful.<br>&mdash; Lady Whistledown</p>
    </div>
  </footer>

  <script>
    (async function () {
      const container = document.getElementById('episodes');
      try {
        const res = await fetch('./daily/voice/manifest.json');
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        const episodes = (data.episodes || []).sort((a, b) => b.date.localeCompare(a.date));

        if (!episodes.length) {
          container.innerHTML = '<p class="empty">No dispatches yet.</p>';
          return;
        }

        container.innerHTML = episodes.map((ep, i) => {
          const d = new Date(ep.date + 'T12:00:00');
          const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
          const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
          const dateline = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} · San Francisco`.toUpperCase();

          return `
            <div class="episode${i === 0 ? ' featured' : ''}">
              <div class="seal">W</div>
              <div class="episode-dateline">${dateline}</div>
              <audio controls ${i === 0 ? 'preload="auto"' : 'preload="none"'}>
                <source src="./daily/voice/${ep.file}" type="audio/mpeg">
              </audio>
            </div>
          `;
        }).join('');
      } catch (e) {
        container.innerHTML = '<p class="empty">Could not load dispatches.</p>';
      }
    })();
  </script>
</body>
</html>
