<!--
  Decaf Audio Player — GitHub Pages
  When new episodes are added, update daily/voice/manifest.json with the new entry.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decaf — Lady Whistledown Daily</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: Georgia, "Times New Roman", serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #21262d;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #87a96b;
      font-size: 0.95rem;
      font-style: italic;
      opacity: 0.9;
    }

    .episodes {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .episode {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 1.25rem;
      transition: border-color 0.2s;
    }

    .episode:first-child {
      border-color: #87a96b;
    }

    .episode-date {
      font-size: 1.05rem;
      margin-bottom: 0.75rem;
      color: #e6edf3;
    }

    .episode:first-child .episode-date::after {
      content: " · Latest";
      color: #87a96b;
      font-size: 0.8rem;
      font-style: italic;
    }

    audio {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      outline: none;
    }

    audio::-webkit-media-controls-panel {
      background: #21262d;
    }

    .empty {
      text-align: center;
      color: #484f58;
      padding: 3rem 1rem;
      font-style: italic;
    }

    @media (min-width: 600px) {
      body { padding: 3rem 2rem 5rem; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>&#x1FAD6; Decaf — Lady Whistledown Daily</h1>
      <p class="subtitle">The intelligence of the day, without the breathlessness</p>
    </header>
    <div class="episodes" id="episodes">
      <p class="empty">Loading episodes…</p>
    </div>
  </div>

  <script>
    (async function () {
      const container = document.getElementById('episodes');
      try {
        const res = await fetch('./daily/voice/manifest.json');
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        const episodes = (data.episodes || []).sort((a, b) => b.date.localeCompare(a.date));

        if (!episodes.length) {
          container.innerHTML = '<p class="empty">No episodes yet.</p>';
          return;
        }

        container.innerHTML = episodes.map((ep, i) => `
          <div class="episode">
            <div class="episode-date">${ep.label}</div>
            <audio controls ${i === 0 ? 'preload="auto"' : 'preload="none"'}>
              <source src="./daily/voice/${ep.file}" type="audio/mpeg">
            </audio>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p class="empty">Could not load episodes.</p>';
      }
    })();
  </script>
</body>
</html>
