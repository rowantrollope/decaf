<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 280px;
      padding: 16px;
      background: #fafaf7;
      color: #2d2d2d;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #e5e5e0;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green { background: #4a7c59; }
    .status-dot.yellow { background: #c49440; }
    .status-dot.red { background: #c44040; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid #e5e5e0;
      border-bottom: 1px solid #e5e5e0;
      margin-bottom: 12px;
    }
    .toggle-row span { font-size: 13px; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #4a7c59; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .stats {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
    }
    .stats strong { color: #4a7c59; }
    a {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #4a7c59;
      text-decoration: none;
      padding: 4px;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span>🌿</span>
    <h1>ChillMode</h1>
  </div>

  <div class="status-indicator" id="providerStatus">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>

  <div class="toggle-row">
    <span>Rewriting enabled</span>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="stats" id="stats"></div>

  <a href="#" id="openSettings">Settings</a>

  <script src="popup.js"></script>
</body>
</html>
